<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intra in cont</title>
  <link rel="stylesheet" href="intra-in-cont.css">
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h2>Autentificare</h2>
      <form action="/login" method="post">
        <label for="login-email">Email:</label>
        <input type="email" name="email" id="login-email" placeholder="Email" required>
        <label for="login-password">Parola:</label>
        <input type="password" name="password" id="login-password" placeholder="Parola" required>
        <button type="submit">Autentificare</button>
      </form>
    </div>
    <div class="form-container">
      <form action="/signup" method="post">
        <label for="signup-email">Email:</label>
        <input type="email" name="email" id="signup-email" placeholder="Email" required>
        <label for="signup-password">Parola:</label>
        <input type="password" name="password" id="signup-password" placeholder="Parola" required>
        <label for="singup-confirm-password">Confirmare parola:</label>
        <input type="password" id="singup-confirm-password" name="confirm-password" placeholder="Confirmare parola" required>
        <button type="submit">Creare cont</button>
      </form>
    </div>
  </div>
</body>
</html>
